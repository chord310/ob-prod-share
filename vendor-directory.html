<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>特約輔具廠商名單</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --ink: #18202a;
      --muted: #64748b;
      --line: #d9e0ea;
      --accent: #0f766e;
      --accent-dark: #115e59;
      --panel: #ffffff;
      --warn: #9a3412;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", sans-serif;
      background: var(--bg);
      color: var(--ink);
    }
    header {
      padding: 18px 20px;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
    }
    h1 {
      margin: 0 0 4px;
      font-size: 22px;
      line-height: 1.3;
      letter-spacing: 0;
    }
    .sub {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }
    main {
      display: grid;
      grid-template-columns: minmax(340px, 440px) minmax(420px, 1fr);
      min-height: calc(100vh - 88px);
    }
    aside {
      padding: 16px;
      overflow: auto;
      border-right: 1px solid var(--line);
      background: var(--panel);
    }
    #map {
      min-height: 560px;
      background: #dce7ee;
    }
    .status,
    .filters {
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfcfe;
      line-height: 1.6;
    }
    .status {
      color: var(--muted);
      margin-bottom: 12px;
    }
    .filters {
      display: grid;
      gap: 10px;
      margin-bottom: 12px;
    }
    label {
      display: grid;
      gap: 4px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }
    select,
    input {
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px 10px;
      font: inherit;
      color: var(--ink);
      background: #fff;
    }
    .vendor {
      padding: 14px 0;
      border-bottom: 1px solid var(--line);
    }
    .vendor h2 {
      margin: 0 0 6px;
      font-size: 17px;
      line-height: 1.35;
      letter-spacing: 0;
    }
    .meta {
      margin: 0 0 8px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }
    .tag {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 3px 8px;
      border-radius: 999px;
      color: var(--accent-dark);
      background: #d9f4ef;
      font-size: 12px;
      font-weight: 800;
    }
    .warning { color: var(--warn); }
    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    a.button {
      display: inline-flex;
      align-items: center;
      min-height: 36px;
      padding: 8px 12px;
      border-radius: 8px;
      text-decoration: none;
      color: #fff;
      background: var(--accent);
      font-weight: 700;
      font-size: 14px;
    }
    a.button.secondary {
      color: var(--accent-dark);
      background: #d9f4ef;
    }
    .map-marker {
      display: grid;
      place-items: center;
      min-width: 48px;
      height: 32px;
      padding: 0 8px;
      border: 2px solid #fff;
      border-radius: 999px;
      box-shadow: 0 2px 8px rgba(15, 23, 42, 0.28);
      color: #fff;
      font-weight: 800;
      font-size: 12px;
      line-height: 1;
      background: #b45309;
    }
    .precise-marker {
      min-width: 32px;
      padding: 0;
      background: var(--accent);
    }
    .map-note {
      max-width: 340px;
      margin: 12px;
      background: rgba(255, 255, 255, 0.94);
      box-shadow: 0 2px 10px rgba(15, 23, 42, 0.16);
    }
    @media (max-width: 880px) {
      main { grid-template-columns: 1fr; }
      aside { border-right: 0; border-bottom: 1px solid var(--line); }
      #map { min-height: 420px; }
    }
  </style>
</head>
<body>
  <header>
    <h1>特約輔具廠商名單</h1>
    <p class="sub" id="summary">正在載入新北市特約輔具廠商清冊...</p>
  </header>
  <main>
    <aside>
      <div id="status" class="status">正在讀取全部廠商資料。</div>
      <form class="filters" id="filters">
        <label>行政區
          <select id="districtFilter"></select>
        </label>
        <label>服務類型
          <select id="serviceFilter">
            <option value="">全部</option>
            <option value="購置">購置</option>
            <option value="租賃">租賃</option>
            <option value="__blank__">未標示</option>
          </select>
        </label>
        <label>單位類型
          <select id="categoryFilter"></select>
        </label>
        <label>關鍵字
          <input id="keywordFilter" type="search" placeholder="搜尋店名、地址、電話">
        </label>
      </form>
      <div id="vendorList"></div>
    </aside>
    <section id="map" aria-label="OpenStreetMap vendor directory map"></section>
  </main>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="vendor-directory.js?v=20260526-vendor-category-v1"></script>
</body>
</html>

<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>特約輔具廠商地圖</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --ink: #18202a;
      --muted: #64748b;
      --line: #d9e0ea;
      --accent: #0f766e;
      --accent-dark: #115e59;
      --panel: #ffffff;
      --warn: #9a3412;
      --home: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", sans-serif;
      background: var(--bg);
      color: var(--ink);
    }
    header {
      padding: 18px 20px;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
    }
    h1 {
      margin: 0 0 4px;
      font-size: 22px;
      line-height: 1.3;
      letter-spacing: 0;
    }
    .sub {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }
    main {
      display: grid;
      grid-template-columns: minmax(320px, 420px) minmax(360px, 1fr);
      min-height: calc(100vh - 86px);
    }
    aside {
      padding: 16px;
      overflow: auto;
      border-right: 1px solid var(--line);
      background: var(--panel);
    }
    #map {
      min-height: 520px;
      background: #dce7ee;
    }
    .status {
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--muted);
      background: #fbfcfe;
      line-height: 1.6;
    }
    .result-count {
      position: sticky;
      top: 0;
      z-index: 2;
      margin: 12px 0 0;
      padding: 10px 12px;
      border: 1px solid #c3ded8;
      border-radius: 8px;
      color: var(--accent-dark);
      background: #eef8f6;
      font-size: 13px;
      font-weight: 700;
      line-height: 1.5;
    }
    .map-fallback { margin: 16px; }
    .vendor {
      padding: 14px 0;
      border-bottom: 1px solid var(--line);
    }
    .vendor h2 {
      margin: 0 0 6px;
      font-size: 17px;
      line-height: 1.35;
      letter-spacing: 0;
    }
    .meta {
      margin: 0 0 8px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }
    .tag {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 3px 8px;
      border-radius: 999px;
      color: var(--accent-dark);
      background: #d9f4ef;
      font-size: 12px;
      font-weight: 800;
    }
    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .quick-links {
      display: grid;
      gap: 8px;
      margin-top: 12px;
    }
    a.button {
      display: inline-flex;
      align-items: center;
      min-height: 36px;
      padding: 8px 12px;
      border-radius: 8px;
      text-decoration: none;
      color: #fff;
      background: var(--accent);
      font-weight: 700;
      font-size: 14px;
    }
    a.button.secondary {
      color: var(--accent-dark);
      background: #d9f4ef;
    }
    .warning { color: var(--warn); }
    .leaflet-container { font-family: inherit; }
    .map-marker {
      display: grid;
      place-items: center;
      width: 32px;
      height: 32px;
      border: 2px solid #fff;
      border-radius: 999px;
      box-shadow: 0 2px 8px rgba(15, 23, 42, 0.28);
      color: #fff;
      font-weight: 800;
      font-size: 13px;
      line-height: 1;
    }
    .home-marker { background: var(--home); }
    .vendor-marker { background: var(--accent); }
    .estimate-marker {
      width: 64px;
      background: #b45309;
      font-size: 12px;
    }
    .map-note {
      max-width: 320px;
      margin: 12px;
      background: rgba(255, 255, 255, 0.94);
      box-shadow: 0 2px 10px rgba(15, 23, 42, 0.16);
    }
    .group-summary {
      margin-top: 8px;
      color: var(--accent-dark);
      font-weight: 800;
    }
    @media (max-width: 860px) {
      main { grid-template-columns: 1fr; }
      aside { border-right: 0; border-bottom: 1px solid var(--line); }
      #map { min-height: 420px; }
    }
  </style>
</head>
<body>
  <header>
    <h1>特約輔具廠商地圖</h1>
    <p class="sub" id="summary">正在載入地圖資料...</p>
  </header>
  <main>
    <aside>
      <div id="status" class="status">正在讀取分享結果。</div>
      <div id="resultCount" class="result-count" hidden></div>
      <div id="vendorList"></div>
    </aside>
    <section id="map" aria-label="OpenStreetMap map"></section>
  </main>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="vendor-locator.js?v=20260526-vendor-category-v1"></script>
</body>
</html>
